name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt
      - uses: taiki-e/install-action@nextest
      - name: Run repo verification stack
        run: cargo xtask verify --run-id ci
